<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кабинет курьера — Blinds Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --success: #16a34a;
      --success-light: #dcfce7;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --pending: #cbd5e1;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 16px rgba(15, 23, 42, 0.06);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .hidden {
      display: none !important;
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-user-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
    }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-logout:hover {
      background: var(--danger-light);
      color: var(--danger);
      border-color: #fecaca;
    }

    .btn-logout svg {
      width: 16px;
      height: 16px;
    }

    .content {
      flex: 1;
      padding: 24px 28px 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .alert {
      display: none;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.875rem;
    }

    .alert.visible {
      display: block;
    }

    .alert-error {
      background: var(--danger-light);
      color: var(--danger);
      border: 1px solid #fecaca;
    }

    .alert-success {
      background: var(--success-light);
      color: var(--success);
      border: 1px solid #bbf7d0;
    }

    .section-block {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-heading {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .loading-state,
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .data-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    .data-table th,
    .data-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .data-table th {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      background: var(--bg);
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-new { background: var(--primary-light); color: var(--primary); }
    .status-in_production { background: var(--warning-light); color: var(--warning); }
    .status-ready { background: #e0e7ff; color: #4338ca; }
    .status-delivered { background: var(--success-light); color: var(--success); }
    .status-cancelled { background: var(--danger-light); color: var(--danger); }

    .btn-pay {
      padding: 6px 12px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-pay:hover {
      background: var(--primary-hover);
    }

    .total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      font-size: 0.9375rem;
      font-weight: 600;
    }

    .total-row span:last-child {
      font-size: 1.125rem;
      color: var(--primary);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.18);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 60%);
    }

    .modal-header h2 {
      font-size: 1.125rem;
      font-weight: 700;
    }

    .modal-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: var(--bg);
      color: var(--text);
    }

    .modal-body {
      padding: 24px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 24px 24px;
    }

    .form-group {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      font-family: inherit;
      font-size: 0.9375rem;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
    }

    .btn-cancel {
      padding: 10px 18px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-cancel:hover {
      background: var(--border);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .modal-form-error {
      display: none;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 0.8125rem;
      color: var(--danger);
      background: var(--danger-light);
      border: 1px solid #fecaca;
      border-radius: 8px;
    }

    .modal-form-error.visible {
      display: block;
    }

    @media (max-width: 600px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        padding: 12px 16px;
      }

      .topbar-user {
        width: 100%;
        justify-content: space-between;
      }

      .content {
        padding: 16px;
        gap: 20px;
      }

      .data-table th,
      .data-table td {
        padding: 10px 12px;
        font-size: 0.8125rem;
      }

      .modal-overlay {
        padding: 12px;
        align-items: flex-end;
      }

      .modal {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }

      .total-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Кабинет курьера</h1>
      </div>
      <div class="topbar-user">
        <span class="topbar-user-name" id="courierName"></span>
        <button class="btn-logout" id="btnLogout" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Выйти
        </button>
      </div>
    </header>

    <main class="content">
      <div class="alert alert-success" id="alertSuccess" role="status"></div>
      <div class="alert alert-error" id="alertError" role="alert"></div>

      <section class="section-block">
        <h2 class="section-heading">Мои доставки</h2>

        <div class="loading-state" id="ordersLoading">
          <div class="spinner"></div>
          <p>Загрузка доставок…</p>
        </div>

        <div class="empty-state hidden" id="ordersEmpty">
          <p>Нет назначенных доставок</p>
        </div>

        <div class="data-card hidden" id="ordersCard">
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Номер заказа</th>
                  <th>Товар</th>
                  <th>Дилер</th>
                  <th>Статус</th>
                  <th>Дата</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="ordersTbody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="section-block">
        <h2 class="section-heading">Принятые оплаты (не сданы в кассу)</h2>

        <div class="loading-state" id="paymentsLoading">
          <div class="spinner"></div>
          <p>Загрузка платежей…</p>
        </div>

        <div class="empty-state hidden" id="paymentsEmpty">
          <p>Нет несданных платежей</p>
        </div>

        <div class="data-card hidden" id="paymentsCard">
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Заказ №</th>
                  <th>Сумма</th>
                  <th>Дата получения</th>
                </tr>
              </thead>
              <tbody id="paymentsTbody"></tbody>
            </table>
          </div>
          <div class="total-row" id="paymentsTotalCard">
            <span>Итого к сдаче:</span>
            <span id="paymentsTotal"></span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="paymentModal" role="dialog" aria-modal="true" aria-labelledby="paymentModalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 id="paymentModalTitle">Принять оплату</h2>
        <button class="modal-close" id="paymentModalClose" type="button" aria-label="Закрыть">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-form-error" id="paymentFormError"></div>
        <div class="form-group">
          <label for="paymentAmount">Сумма (₽)</label>
          <input type="number" id="paymentAmount" min="0.01" step="0.01" placeholder="0.00" required>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="paymentCancel" type="button">Отмена</button>
        <button class="btn-primary" id="paymentConfirm" type="button">Подтвердить</button>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "authToken";

    const STATUS_LABELS = {
      new: "Новый",
      in_production: "В производстве",
      ready: "Готов",
      delivered: "Доставлен",
      cancelled: "Отменён",
    };

    const courierName = document.getElementById("courierName");
    const btnLogout = document.getElementById("btnLogout");
    const alertSuccess = document.getElementById("alertSuccess");
    const alertError = document.getElementById("alertError");
    const ordersLoading = document.getElementById("ordersLoading");
    const ordersEmpty = document.getElementById("ordersEmpty");
    const ordersCard = document.getElementById("ordersCard");
    const ordersTbody = document.getElementById("ordersTbody");
    const paymentsLoading = document.getElementById("paymentsLoading");
    const paymentsEmpty = document.getElementById("paymentsEmpty");
    const paymentsCard = document.getElementById("paymentsCard");
    const paymentsTotalCard = document.getElementById("paymentsTotalCard");
    const paymentsTbody = document.getElementById("paymentsTbody");
    const paymentsTotal = document.getElementById("paymentsTotal");
    const paymentModal = document.getElementById("paymentModal");
    const paymentModalClose = document.getElementById("paymentModalClose");
    const paymentCancel = document.getElementById("paymentCancel");
    const paymentConfirm = document.getElementById("paymentConfirm");
    const paymentAmount = document.getElementById("paymentAmount");
    const paymentFormError = document.getElementById("paymentFormError");

    let authToken = "";
    let currentOrderId = null;
    let successTimeout = null;

    /**
     * Декодирует payload JWT без внешних библиотек.
     */
    function decodeJwt(token) {
      try {
        const base64 = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        return JSON.parse(atob(base64));
      } catch {
        return null;
      }
    }

    /**
     * Перенаправляет на страницу входа администратора.
     */
    function redirectToLogin() { window.location.href = "/static/login.html"; }

    /**
     * Проверяет авторизацию курьера при загрузке страницы.
     */
    function checkAuth() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) {
        redirectToLogin();
        return null;
      }

      const payload = decodeJwt(token);
      if (!payload || payload.role !== "courier") {
        redirectToLogin();
        return null;
      }

      authToken = token;
      courierName.textContent = payload.full_name || "";
      return payload;
    }

    /**
     * Экранирует HTML для безопасного вывода.
     */
    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    /**
     * Форматирует дату ISO в короткий локальный вид.
     */
    function formatDateShort(isoString) {
      return new Date(isoString).toLocaleString("ru-RU", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    /**
     * Форматирует сумму в рублях.
     */
    function formatAmount(amount) {
      const value = Number(amount);
      return value.toLocaleString("ru-RU", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      }) + " ₽";
    }

    /**
     * Возвращает отображаемый номер заказа.
     */
    function orderNumber(order) {
      return order.external_id || String(order.id);
    }

    /**
     * Создаёт HTML бейджа статуса.
     */
    function renderStatusBadge(status) {
      const label = STATUS_LABELS[status] || status;
      return `<span class="status-badge status-${status}"><span class="dot"></span>${escapeHtml(label)}</span>`;
    }

    /**
     * Показывает сообщение об ошибке.
     */
    function showError(message) {
      alertError.textContent = message;
      alertError.classList.add("visible");
    }

    /**
     * Скрывает сообщение об ошибке.
     */
    function hideError() {
      alertError.classList.remove("visible");
      alertError.textContent = "";
    }

    /**
     * Показывает уведомление об успехе.
     */
    function showSuccess(message) {
      if (successTimeout) {
        clearTimeout(successTimeout);
      }
      alertSuccess.textContent = message;
      alertSuccess.classList.add("visible");
      successTimeout = setTimeout(() => {
        alertSuccess.classList.remove("visible");
        alertSuccess.textContent = "";
      }, 4000);
    }

    /**
     * Выполняет авторизованный GET-запрос к API.
     */
    async function apiFetch(url) {
      const response = await fetch(url, {
        headers: { Authorization: "Bearer " + authToken },
      });

      if (response.status === 401) {
        localStorage.removeItem("authToken");
        localStorage.removeItem("authUsername");
        localStorage.removeItem("authRole");
        localStorage.removeItem("authFullName");
        localStorage.removeItem("authManagerId");
        redirectToLogin();
        throw new Error("Сессия истекла");
      }

      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data.detail || "Ошибка загрузки данных");
      }

      return response.json();
    }

    /**
     * Выполняет авторизованный POST-запрос к API.
     */
    async function apiPost(url, body) {
      const response = await fetch(url, {
        method: "POST",
        headers: {
          Authorization: "Bearer " + authToken,
          "Content-Type": "application/json",
        },
        body: JSON.stringify(body),
      });

      if (response.status === 401) {
        localStorage.removeItem("authToken");
        localStorage.removeItem("authUsername");
        localStorage.removeItem("authRole");
        localStorage.removeItem("authFullName");
        localStorage.removeItem("authManagerId");
        redirectToLogin();
        throw new Error("Сессия истекла");
      }

      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        const detail = data.detail;
        const message = typeof detail === "string"
          ? detail
          : Array.isArray(detail)
            ? detail.map((item) => item.msg || String(item)).join(", ")
            : "Ошибка выполнения запроса";
        throw new Error(message);
      }

      return response.json();
    }

    /**
     * Отрисовывает таблицу доставок.
     */
    function renderOrders(orders) {
      ordersLoading.classList.add("hidden");

      if (!orders.length) {
        ordersEmpty.classList.remove("hidden");
        ordersCard.classList.add("hidden");
        return;
      }

      ordersEmpty.classList.add("hidden");
      ordersCard.classList.remove("hidden");
      ordersTbody.innerHTML = "";

      for (const order of orders) {
        const tr = document.createElement("tr");
        const dealerLabel = order.dealer_id != null ? String(order.dealer_id) : "—";
        tr.innerHTML = `
          <td>${escapeHtml(orderNumber(order))}</td>
          <td>${escapeHtml(order.product_name)}</td>
          <td>${escapeHtml(dealerLabel)}</td>
          <td>${renderStatusBadge(order.status)}</td>
          <td>${escapeHtml(formatDateShort(order.created_at))}</td>
          <td><button class="btn-pay" type="button" data-order-id="${order.id}">Принять оплату</button></td>
        `;
        ordersTbody.appendChild(tr);
      }

      ordersTbody.querySelectorAll(".btn-pay").forEach((btn) => {
        btn.addEventListener("click", () => {
          openPaymentModal(Number(btn.dataset.orderId));
        });
      });
    }

    /**
     * Отрисовывает таблицу несданных платежей.
     */
    function renderPayments(payments) {
      paymentsLoading.classList.add("hidden");

      if (!payments.length) {
        paymentsEmpty.classList.remove("hidden");
        paymentsCard.classList.add("hidden");
        return;
      }

      paymentsEmpty.classList.add("hidden");
      paymentsCard.classList.remove("hidden");
      paymentsTbody.innerHTML = "";

      let total = 0;
      for (const payment of payments) {
        total += Number(payment.amount);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(String(payment.order_id))}</td>
          <td>${escapeHtml(formatAmount(payment.amount))}</td>
          <td>${escapeHtml(formatDateShort(payment.received_at))}</td>
        `;
        paymentsTbody.appendChild(tr);
      }

      paymentsTotal.textContent = formatAmount(total);
    }

    /**
     * Загружает список несданных платежей курьера.
     */
    async function loadPayments() {
      try {
        const payments = await apiFetch("/couriers/payments?unsettled=true");
        renderPayments(payments);
      } catch (err) {
        paymentsLoading.classList.add("hidden");
        if (err.message !== "Сессия истекла") {
          showError(err.message || "Не удалось загрузить платежи");
        }
      }
    }

    /**
     * Загружает список доставок курьера.
     */
    async function loadOrders() {
      try {
        hideError();
        const orders = await apiFetch("/couriers/orders");
        renderOrders(orders);
      } catch (err) {
        ordersLoading.classList.add("hidden");
        if (err.message !== "Сессия истекла") {
          showError(err.message || "Не удалось загрузить доставки");
        }
      }
    }

    /**
     * Открывает модальное окно приёма оплаты.
     */
    function openPaymentModal(orderId) {
      currentOrderId = orderId;
      paymentAmount.value = "";
      paymentFormError.classList.remove("visible");
      paymentFormError.textContent = "";
      paymentModal.classList.add("visible");
      paymentAmount.focus();
    }

    /**
     * Закрывает модальное окно приёма оплаты.
     */
    function closePaymentModal() {
      paymentModal.classList.remove("visible");
      currentOrderId = null;
      paymentAmount.value = "";
      paymentFormError.classList.remove("visible");
      paymentFormError.textContent = "";
    }

    /**
     * Подтверждает приём оплаты по заказу.
     */
    async function confirmPayment() {
      if (!currentOrderId) {
        return;
      }

      const amount = parseFloat(paymentAmount.value);
      if (!amount || amount <= 0) {
        paymentFormError.textContent = "Укажите корректную сумму";
        paymentFormError.classList.add("visible");
        return;
      }

      paymentConfirm.disabled = true;
      paymentFormError.classList.remove("visible");
      paymentFormError.textContent = "";

      try {
        await apiPost("/couriers/payments", {
          order_id: currentOrderId,
          amount: amount
        });
        closePaymentModal();
        showSuccess("Оплата принята");
        await loadOrders();
        await loadPayments();
      } catch (err) {
        if (err.message !== "Сессия истекла") {
          paymentFormError.textContent = err.message || "Не удалось принять оплату";
          paymentFormError.classList.add("visible");
        }
      } finally {
        paymentConfirm.disabled = false;
      }
    }

    btnLogout.addEventListener("click", () => {
      localStorage.removeItem("authToken");
      localStorage.removeItem("authUsername");
      localStorage.removeItem("authRole");
      localStorage.removeItem("authFullName");
      localStorage.removeItem("authManagerId");
      redirectToLogin();
    });

    paymentModalClose.addEventListener("click", closePaymentModal);
    paymentCancel.addEventListener("click", closePaymentModal);
    paymentConfirm.addEventListener("click", confirmPayment);

    paymentModal.addEventListener("click", (e) => {
      if (e.target === paymentModal) {
        closePaymentModal();
      }
    });

    paymentAmount.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        confirmPayment();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && paymentModal.classList.contains("visible")) {
        closePaymentModal();
      }
    });

    if (checkAuth()) {
      loadOrders();
      loadPayments();
    }
  </script>
</body>
</html>
