<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Blinds Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4f8;
      --sidebar-bg: #0f172a;
      --sidebar-text: #94a3b8;
      --sidebar-active: #ffffff;
      --sidebar-accent: #3b82f6;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --success: #16a34a;
      --success-light: #dcfce7;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --pending: #cbd5e1;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 16px rgba(15, 23, 42, 0.06);
      --radius: 12px;
      --sidebar-width: 260px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .login-logo-icon {
      width: 44px;
      height: 44px;
      background: var(--sidebar-accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .login-logo-icon svg {
      width: 22px;
      height: 22px;
      color: #fff;
    }

    .login-logo-text {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .login-field {
      margin-bottom: 16px;
    }

    .login-field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-field input {
      width: 100%;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 0.9375rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 0.15s;
    }

    .login-field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .login-error {
      display: none;
      font-size: 0.8125rem;
      color: var(--danger);
      background: var(--danger-light);
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .login-error.visible {
      display: block;
    }

    .btn-login {
      width: 100%;
      padding: 12px 20px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-login:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="3" y1="15" x2="21" y2="15"/>
          </svg>
        </div>
        <div class="login-logo-text">Blinds Tracker</div>
      </div>

      <div class="login-error" id="loginError" role="alert"></div>

      <form id="loginForm">
        <div class="login-field">
          <label for="username">Логин</label>
          <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="login-field">
          <label for="password">Пароль</label>
          <div style="position:relative;">
            <input type="password" id="password" name="password" autocomplete="current-password" required style="width:100%;padding-right:44px;">
            <button type="button" onclick="togglePassword()" id="toggleBtn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;display:flex;align-items:center;">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="btn-login" id="btnLogin" type="submit">Войти</button>
      </form>
    </div>
  </div>

  <script>
    const AUTH_TOKEN_KEY = "authToken";
    const AUTH_USERNAME_KEY = "authUsername";
    const AUTH_ROLE_KEY = "authRole";
    const AUTH_FULL_NAME_KEY = "authFullName";
    const AUTH_MANAGER_ID_KEY = "authManagerId";

    const ROLE_REDIRECTS = {
      admin: "/static/admin.html",
      manager: "/static/admin.html",
      dealer: "/static/dealer.html",
      courier: "/static/courier.html",
      cashier: "/static/cashier.html",
      superadmin: "/static/superadmin.html",
    };

    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const btnLogin = document.getElementById("btnLogin");

    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");
      const isHidden = passwordInput.type === "password";

      passwordInput.type = isHidden ? "text" : "password";
      eyeIcon.innerHTML = isHidden
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    function saveAuth(token, username, role, fullName, managerId) {
      localStorage.setItem(AUTH_TOKEN_KEY, token);
      localStorage.setItem(AUTH_USERNAME_KEY, username);
      localStorage.setItem(AUTH_ROLE_KEY, role);
      localStorage.setItem(AUTH_FULL_NAME_KEY, fullName);
      localStorage.setItem(AUTH_MANAGER_ID_KEY, String(managerId));
    }

    function redirectByRole(role) {
      const url = ROLE_REDIRECTS[role];
      if (url) {
        window.location.href = url;
        return;
      }
      throw new Error("Неизвестная роль пользователя.");
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginError.classList.remove("visible");
      loginError.textContent = "";
      btnLogin.disabled = true;

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || "Неверный логин или пароль.");
        }

        const data = await response.json();
        saveAuth(
          data.access_token,
          data.username,
          data.role,
          data.full_name,
          data.manager_id
        );
        redirectByRole(data.role);
      } catch (err) {
        loginError.textContent = err.message || "Ошибка входа.";
        loginError.classList.add("visible");
      } finally {
        btnLogin.disabled = false;
      }
    });
  </script>
</body>
</html>
