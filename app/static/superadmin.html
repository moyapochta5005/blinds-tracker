<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Суперадмин — Blinds Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4f8;
      --sidebar-bg: #0f172a;
      --sidebar-text: #94a3b8;
      --sidebar-active: #ffffff;
      --sidebar-accent: #3b82f6;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --success: #16a34a;
      --success-light: #dcfce7;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --pending: #cbd5e1;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 16px rgba(15, 23, 42, 0.06);
      --radius: 12px;
      --sidebar-width: 260px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--sidebar-accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-logo-icon svg {
      width: 20px;
      height: 20px;
      color: #fff;
    }

    .sidebar-logo-text {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--sidebar-active);
      line-height: 1.3;
    }

    .sidebar-logo-sub {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--sidebar-text);
    }

    .sidebar-user {
      margin-top: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 8px;
    }

    .sidebar-user-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--sidebar-active);
    }

    .sidebar-user-role {
      font-size: 0.75rem;
      color: var(--sidebar-text);
      margin-top: 2px;
    }

    .btn-logout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 12px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--sidebar-text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-logout:hover {
      background: rgba(220, 38, 38, 0.2);
      color: #fca5a5;
      border-color: rgba(220, 38, 38, 0.3);
    }

    .btn-logout svg {
      width: 16px;
      height: 16px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
    }

    .nav-section-title {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #475569;
      padding: 8px 12px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--sidebar-text);
      background: none;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item.active {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      margin-left: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar-title p {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--primary);
      background: var(--primary-light);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-refresh:hover {
      background: #dbeafe;
    }

    .btn-refresh svg {
      width: 16px;
      height: 16px;
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-add:hover {
      background: var(--primary-hover);
    }

    .btn-add svg {
      width: 16px;
      height: 16px;
    }

    .content {
      flex: 1;
      padding: 24px 28px 40px;
    }

    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .companies-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    .companies-table th,
    .companies-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .companies-table th {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      background: var(--bg);
    }

    .companies-table tbody tr:last-child td {
      border-bottom: none;
    }

    .companies-table code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.8125rem;
      padding: 2px 6px;
      background: var(--bg);
      border-radius: 4px;
      color: var(--text);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-success {
      background: var(--success-light);
      color: var(--success);
    }

    .badge-danger {
      background: var(--danger-light);
      color: var(--danger);
    }

    .btn {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .btn-success {
      color: #fff;
      background: var(--success);
    }

    .btn-success:hover {
      background: #15803d;
    }

    .btn-danger {
      color: #fff;
      background: var(--danger);
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-cancel {
      padding: 10px 18px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-cancel:hover {
      background: var(--border);
    }

    .btn-primary {
      padding: 10px 18px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-box {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.18);
      overflow: hidden;
    }

    .modal-header {
      padding: 20px 24px 0;
    }

    .modal-header h2 {
      font-size: 1.125rem;
      font-weight: 700;
    }

    .modal-body {
      padding: 20px 24px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 24px 24px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      font-family: inherit;
      font-size: 0.9375rem;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
    }

    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .main {
        margin-left: 0;
      }

      .topbar {
        padding: 12px 16px;
        flex-wrap: wrap;
        gap: 12px;
      }

      .content {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <line x1="3" y1="9" x2="21" y2="9"/>
              <line x1="3" y1="15" x2="21" y2="15"/>
            </svg>
          </div>
          <div>
            <div class="sidebar-logo-text">Blinds Tracker</div>
            <div class="sidebar-logo-sub">Суперадмин</div>
          </div>
        </div>
        <div class="sidebar-user">
          <div class="sidebar-user-name" id="userName"></div>
          <div class="sidebar-user-role">Суперадминистратор</div>
          <button class="btn-logout" type="button" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Выйти
          </button>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Навигация">
        <div class="nav-section-title">Управление</div>
        <button class="nav-item active" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/></svg>
          Компании
        </button>
      </nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-title">
          <h1>Управление компаниями</h1>
          <p>Список всех компаний в системе</p>
        </div>
        <div class="topbar-actions">
          <button class="btn-add" type="button" onclick="openModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Добавить компанию
          </button>
          <button class="btn-refresh" type="button" onclick="loadCompanies()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Обновить
          </button>
        </div>
      </header>

      <main class="content">
        <div class="table-card">
          <div class="table-wrap">
            <table class="companies-table">
              <thead>
                <tr>
                  <th>Название</th>
                  <th>Slug</th>
                  <th>Статус</th>
                  <th>Дата создания</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody id="companiesTableBody">
                <tr>
                  <td colspan="5" style="text-align:center;padding:32px;color:var(--text-muted)">Загрузка...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">Добавить компанию</h2>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="newName">Название компании</label>
          <input type="text" id="newName" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="newSlug">Slug</label>
          <input type="text" id="newSlug" autocomplete="off" pattern="[a-z0-9-]+">
          <div class="form-hint">Латиница, например windows-msk</div>
        </div>
        <div class="form-group">
          <label for="newUsername">Логин администратора</label>
          <input type="text" id="newUsername" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="newPassword">Пароль администратора</label>
          <input type="password" id="newPassword" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="newFullName">Полное имя администратора</label>
          <input type="text" id="newFullName" autocomplete="off">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" type="button" onclick="closeModal()">Отмена</button>
        <button class="btn-primary" type="button" onclick="createCompany()">Создать</button>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "authToken";
    let authToken = null;

    function decodeJwt(token) {
      try {
        const base64 = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        return JSON.parse(atob(base64));
      } catch {
        return null;
      }
    }

    function checkAuth() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) { window.location.href = "/static/login.html"; return; }
      const payload = decodeJwt(token);
      if (!payload || payload.role !== "superadmin") {
        window.location.href = "/static/login.html";
        return;
      }
      authToken = token;
      document.getElementById("userName").textContent = payload.full_name || "Суперадмин";
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      window.location.href = "/static/login.html";
    }

    async function loadCompanies() {
      const res = await fetch("/companies", {
        headers: { Authorization: "Bearer " + authToken }
      });
      if (!res.ok) return;
      const companies = await res.json();
      renderTable(companies);
    }

    function renderTable(companies) {
      const tbody = document.getElementById("companiesTableBody");
      if (companies.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-muted)">Компаний пока нет</td></tr>';
        return;
      }
      tbody.innerHTML = companies.map(c => `
        <tr>
          <td>${c.name}</td>
          <td><code>${c.slug}</code></td>
          <td>${c.is_active
            ? '<span class="badge badge-success">Активна</span>'
            : '<span class="badge badge-danger">Заблокирована</span>'
          }</td>
          <td>${c.created_at}</td>
          <td>
            <button class="btn btn-sm ${c.is_active ? 'btn-danger' : 'btn-success'}"
              onclick="toggleCompany(${c.id}, ${c.is_active})">
              ${c.is_active ? 'Заблокировать' : 'Разблокировать'}
            </button>
          </td>
        </tr>
      `).join("");
    }

    async function toggleCompany(id, isActive) {
      const res = await fetch("/companies/" + id, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + authToken
        },
        body: JSON.stringify({ is_active: !isActive })
      });
      if (res.ok) loadCompanies();
    }

    async function createCompany() {
      const body = {
        name: document.getElementById("newName").value.trim(),
        slug: document.getElementById("newSlug").value.trim(),
        admin_username: document.getElementById("newUsername").value.trim(),
        admin_password: document.getElementById("newPassword").value.trim(),
        admin_full_name: document.getElementById("newFullName").value.trim(),
      };
      if (!body.name || !body.slug || !body.admin_username || !body.admin_password || !body.admin_full_name) {
        alert("Заполните все поля");
        return;
      }
      const res = await fetch("/companies", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + authToken
        },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        closeModal();
        loadCompanies();
      } else {
        const err = await res.json();
        alert(err.detail || "Ошибка создания компании");
      }
    }

    function openModal() {
      document.getElementById("modal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
      document.getElementById("newName").value = "";
      document.getElementById("newSlug").value = "";
      document.getElementById("newUsername").value = "";
      document.getElementById("newPassword").value = "";
      document.getElementById("newFullName").value = "";
    }

    checkAuth();
    loadCompanies();
  </script>
</body>
</html>
